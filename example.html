<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/pixeloid-sans" rel="stylesheet">
  <link rel="preload" href="https://fonts.cdnfonts.com/s/66737/PixeloidSans-nR3g1.woff" as="font" type="font/woff" crossorigin>

  <title>Open Image Viewer – Example</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    h1 {
      margin-top: 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .gallery img:hover {
      border-color: #0f766e;
    }

    .log {
      margin-top: 2rem;
      padding: 1rem;
      background: #f1f5f9;
      border-radius: 8px;
      font-size: 0.875rem;
      max-height: 200px;
      overflow: auto;
    }

    .log pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    button {
      padding: 0.5rem 1rem;
      font: inherit;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: #fff;
    }

    button:hover {
      background: #f1f5f9;
    }
  </style>
</head>

<body>
  <h1>Open Image Viewer – Example</h1>
  <p>
    Click a thumbnail to open the viewer. Uses the built script from <code>dist/open-image-viewer.min.js</code>.
  </p>

  <div class="gallery" id="gallery"></div>

  <p>
    <label>
      Theme:
      <select id="theme">
        <option value="">Default (Win98 style)</option>
        <option value="base">Base (modern)</option>
        <option value="win98">Win98</option>
      </select>
    </label>
    <button type="button" id="btnOpenFirst">Open first image</button>
  </p>

  <h2>Event log</h2>
  <div class="log">
    <pre id="log">(events will appear here)</pre>
  </div>

  <open-image-viewer id="viewer" viewer-title="Gallery" raw-label="Open original" raw-target="_blank">
    <button slot="actions" type="button" id="copyLink">Copy image URL</button>
  </open-image-viewer>

  <script src="dist/open-image-viewer.min.js"></script>
  <script>
    (function () {
      const logEl = document.getElementById('log');
      function log(msg) {
        const line = new Date().toLocaleTimeString() + ' ' + msg;
        logEl.textContent = logEl.textContent === '(events will appear here)'
          ? line
          : logEl.textContent + '\n' + line;
        logEl.parentElement.scrollTop = logEl.parentElement.scrollHeight;
      }

      const galleryItems = [
        {
          src: 'https://picsum.photos/1200/800?random=1',
          title: 'Sample image 1',
          description: 'First placeholder from the gallery.',
          group: 'Demo',
          date: '2024-01-15',
          views: 42
        },
        {
          src: 'https://picsum.photos/1200/800?random=2',
          title: 'Sample image 2',
          description: 'Second placeholder.',
          group: 'Demo',
          date: '2024-01-16',
          views: 18
        },
        {
          src: 'https://picsum.photos/1200/800?random=3',
          title: 'Sample image 3',
          description: 'Third one.',
          group: 'Demo',
          date: '2024-01-17',
          views: 91
        },
        {
          src: 'https://picsum.photos/1200/600?random=4',
          title: 'Sample image 4',
          description: 'Different aspect ratio.',
          group: 'Demo',
          date: '2024-01-18',
          views: 7
        }
      ];

      const viewer = document.getElementById('viewer');
      viewer.items = galleryItems;

      const galleryEl = document.getElementById('gallery');
      galleryItems.forEach((item, index) => {
        const img = document.createElement('img');
        img.src = item.src.replace(/\/\d+\/\d+/, '/200/200');
        img.alt = item.title;
        img.dataset.index = String(index);
        img.loading = 'lazy';
        img.addEventListener('click', () => {
          viewer.show(index, { source: 'gallery_click' });
        });
        galleryEl.appendChild(img);
      });

      document.getElementById('theme').addEventListener('change', (e) => {
        const val = e.target.value;
        if (val) viewer.setAttribute('theme', val);
        else viewer.removeAttribute('theme');
      });

      document.getElementById('btnOpenFirst').addEventListener('click', () => {
        viewer.show(0, { source: 'button' });
      });

      viewer.addEventListener('viewer-open', (e) => {
        log('viewer-open index=' + e.detail.index + ' source=' + e.detail.source);
      });
      viewer.addEventListener('viewer-close', (e) => {
        log('viewer-close reason=' + e.detail.reason);
      });
      viewer.addEventListener('viewer-change', (e) => {
        log('viewer-change index=' + e.detail.index + ' source=' + e.detail.source);
      });
      viewer.addEventListener('viewer-raw-request', (e) => {
        log('viewer-raw-request url=' + e.detail.url);
      });
      viewer.addEventListener('viewer-media-error', (e) => {
        log('viewer-media-error target=' + e.detail.target);
      });

      document.getElementById('copyLink').addEventListener('click', () => {
        const item = viewer.items[viewer.index];
        if (!item) return;
        const url = item.rawSrc || item.viewerSrc || item.src;
        navigator.clipboard.writeText(url).then(() => log('Copied URL to clipboard'));
      });
    })();
  </script>
</body>

</html>
